<svg viewBox="0 0 1800 800" height="800px" width="1800px" role="img" xmlns="http://www.w3.org/2000/svg"><style>text {
            font-family: 'Space Grotesk',-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans",Helvetica,Arial,sans-serif,"Apple Color Emoji","Segoe UI Emoji";
            user-select: none;
            }</style><style>
                    @keyframes flashing {
                        0% {transform: none;}
                        100% {transform: rotate(900deg);}
                    }
                    .noise-circle {
                        fill: transparent;
                        stroke-width: 50px;
                        stroke: #1F1F1F;
                        filter: url(#noise-filter);
                        animation: flashing 1s steps(10, jump-end) infinite;
                    }</style><rect width="1800px" height="800px" fill="#000000"></rect><defs><filter id="noise-filter"><feTurbulence type="fractalNoise" baseFrequency=".6" numOctaves="1" result="turbulence"></feTurbulence><feDisplacementMap in="SourceGraphic" in2="turbulence" xChannelSelector="R" yChannelSelector="G" scale="300"></feDisplacementMap></filter></defs><g transform="translate(900, 400)"><mask id="circle-mask0"><circle r="100" fill="white"></circle></mask><circle r="100" class="noise-circle" mask="url(#circle-mask0)"></circle><mask id="circle-mask1"><circle r="211" fill="white"></circle></mask><circle r="211" class="noise-circle" mask="url(#circle-mask1)"></circle><mask id="circle-mask2"><circle r="323" fill="white"></circle></mask><circle r="323" class="noise-circle" mask="url(#circle-mask2)"></circle><mask id="circle-mask3"><circle r="435" fill="white"></circle></mask><circle r="435" class="noise-circle" mask="url(#circle-mask3)"></circle><mask id="circle-mask4"><circle r="546" fill="white"></circle></mask><circle r="546" class="noise-circle" mask="url(#circle-mask4)"></circle><mask id="circle-mask5"><circle r="658" fill="white"></circle></mask><circle r="658" class="noise-circle" mask="url(#circle-mask5)"></circle><mask id="circle-mask6"><circle r="770" fill="white"></circle></mask><circle r="770" class="noise-circle" mask="url(#circle-mask6)"></circle><mask id="circle-mask7"><circle r="882" fill="white"></circle></mask><circle r="882" class="noise-circle" mask="url(#circle-mask7)"></circle><mask id="circle-mask8"><circle r="993" fill="white"></circle></mask><circle r="993" class="noise-circle" mask="url(#circle-mask8)"></circle><mask id="circle-mask9"><circle r="1105" fill="white"></circle></mask><circle r="1105" class="noise-circle" mask="url(#circle-mask9)"></circle><mask id="circle-mask10"><circle r="1217" fill="white"></circle></mask><circle r="1217" class="noise-circle" mask="url(#circle-mask10)"></circle><mask id="circle-mask11"><circle r="1328" fill="white"></circle></mask><circle r="1328" class="noise-circle" mask="url(#circle-mask11)"></circle><mask id="circle-mask12"><circle r="1440" fill="white"></circle></mask><circle r="1440" class="noise-circle" mask="url(#circle-mask12)"></circle><mask id="circle-mask13"><circle r="1552" fill="white"></circle></mask><circle r="1552" class="noise-circle" mask="url(#circle-mask13)"></circle><mask id="circle-mask14"><circle r="1664" fill="white"></circle></mask><circle r="1664" class="noise-circle" mask="url(#circle-mask14)"></circle></g></svg>